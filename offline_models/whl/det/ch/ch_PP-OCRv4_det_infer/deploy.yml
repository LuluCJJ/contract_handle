Global:
  model_name: "PP-OCRv5_server_det"
  model_type: det
PreProcess:
  transform_ops:
    - DetResizeForTest:
        limit_side_len: 960
        limit_type: max
    - NormalizeImage:
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]
        scale: 0.00392156862745098
        order: ""
    - ToCHWImage: null
PostProcess:
  name: DBPostProcess
  thresh: 0.3
  box_thresh: 0.6
  max_candidates: 1000
  unclip_ratio: 2.0
  use_dilation: false
  score_mode: fast
  box_type: quad
