<!DOCTYPE html>
<html lang='zh-CN'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>银行网银权限预审中心 - V15.0</title>
    <link href='https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css' rel='stylesheet'>
    <link rel='stylesheet' href='/static/style.css'>
    <style>
        :root {
            --audit-blue: #2563eb;
            --audit-bg: #f8fafc;
            --risk-h: #ef4444; --risk-m: #f59e0b; --risk-l: #6366f1; --risk-z: #10b981;
        }
        /* V15.0 新增样式补丁 */
        .result-summary.risk-HIGH_RISK { border-left: 6px solid var(--risk-h); background: #fef2f2; }
        .result-summary.risk-MED_RISK { border-left: 6px solid var(--risk-m); background: #fffbeb; }
        .result-summary.risk-LOW_RISK { border-left: 6px solid var(--risk-l); background: #eef2ff; }
        .result-summary.risk-ZERO_RISK { border-left: 6px solid var(--risk-z); background: #f0fdf4; }

        .aggregator-summary { padding: 20px; font-size: 15px; line-height: 1.8; color: #1e293b; background: white; border-radius: 8px; margin-bottom: 12px; border: 1px solid #e2e8f0; font-weight: 600; }
        .insight-card { display:flex; align-items:flex-start; gap:10px; padding:9px 14px; margin-bottom:7px; border-left:3px solid #f59e0b; background:#fffbeb; border-radius:0 6px 6px 0; font-size:13px; color:#374151; line-height:1.5; }
        .insight-icon { color:#f59e0b; flex-shrink:0; font-size:14px; margin-top:2px; }

        /* 文档手风琴 */
        .doc-accordion-item { border:1px solid #e2e8f0; border-radius:8px; margin-bottom:8px; overflow:hidden; }
        .doc-acc-header { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; background:#f8fafc; cursor:pointer; gap:8px; user-select:none; }
        .doc-acc-header:hover { background:#f1f5f9; }
        .doc-acc-content { display:none; padding:12px; border-top:1px solid #e2e8f0; }
        .doc-accordion-item.open .doc-acc-content { display:block; }
        .doc-arrow { color:#94a3b8; transition:transform 0.2s; }
        .doc-accordion-item.open .doc-arrow { transform:rotate(180deg); }
        .doc-filename { font-weight:600; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:160px; }
        .doc-type-tag { background:#e2e8f0; color:#475569; font-size:10px; padding:2px 7px; border-radius:10px; flex-shrink:0; }
        .doc-kv-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
        .doc-kv-key { font-size:11px; color:#94a3b8; }
        .doc-kv-val { font-size:12px; font-weight:600; color:#1e293b; word-break:break-all; }
        .btn-view-raw { width:100%; padding:6px; border:1px dashed #cbd5e1; border-radius:6px; background:transparent; cursor:pointer; font-size:12px; color:#64748b; }
        .btn-view-raw:hover { border-color:#2563eb; color:#2563eb; }

        /* 徽章 */
        .badge-critical { background:#fee2e2; color:#dc2626; font-size:11px; padding:2px 8px; border-radius:10px; font-weight:700; }
        .badge-warning { background:#fef3c7; color:#d97706; font-size:11px; padding:2px 8px; border-radius:10px; font-weight:700; }
        .badge-info { background:#e0e7ff; color:#4f46e5; font-size:11px; padding:2px 8px; border-radius:10px; font-weight:700; }
        .badge-pass { background:#dcfce7; color:#16a34a; font-size:11px; padding:2px 8px; border-radius:10px; font-weight:700; }

        /* EFlow & Document Unified Accordion Styles */
        .accordion-item { border:1px solid #e2e8f0; border-radius:8px; margin-bottom:10px; background:#fff; overflow:hidden; transition: box-shadow 0.2s; }
        .accordion-item:hover { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .acc-header { display:flex; justify-content:space-between; align-items:center; padding:12px 14px; background:#f8fafc; cursor:pointer; gap:8px; user-select:none; border-bottom:1px solid transparent; }
        .acc-header:hover { background:#f1f5f9; }
        .acc-header i.ri-arrow-down-s-line { color:#94a3b8; transition:transform 0.2s; }
        .accordion-item.open .acc-header { border-bottom-color:#e2e8f0; }
        .accordion-item.open .ri-arrow-down-s-line { transform:rotate(180deg); }
        .acc-content { display:none; padding:14px; }
        .accordion-item.open .acc-content { display:block; }
        .acc-title { font-weight:600; font-size:13px; color:#1e293b; display:flex; align-items:center; gap:8px; }
        .acc-title i { color:var(--audit-blue); font-size:15px; }

        /* 两级折叠审计明细 */
        .doc-check-panel { border:1px solid #e2e8f0; border-radius:10px; margin-bottom:12px; overflow:hidden; }
        .doc-check-header { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; background:#f1f5f9; cursor:pointer; user-select:none; }
        .doc-check-header:hover { background:#e8eef5; }
        .doc-check-content { display:none; padding:12px; }
        .doc-check-panel.open .doc-check-content { display:block; }
        .cat-accordion-item { border:1px solid #f1f5f9; border-radius:6px; margin-bottom:6px; overflow:hidden; }
        .cat-acc-header { display:flex; justify-content:space-between; align-items:center; padding:8px 12px; background:#f8fafc; cursor:pointer; font-size:13px; font-weight:600; user-select:none; }
        .cat-acc-header:hover { background:#f1f5f9; }
        .cat-acc-content { display:none; padding:8px 4px; }
        .cat-accordion-item.open .cat-acc-content { display:block; }
        .check-item { padding:10px 12px; margin-bottom:6px; border-radius:6px; border-left:3px solid #e2e8f0; background:#fafafa; }
        .check-item.sev-critical { border-left-color:#ef4444; background:#fef2f2; }
        .check-item.sev-warning { border-left-color:#f59e0b; background:#fffbeb; }
        .check-item.sev-info { border-left-color:#6366f1; background:#eef2ff; }
        .check-item.sev-pass { border-left-color:#10b981; background:#f0fdf4; }
        .check-item-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
        .check-item-name { font-weight:600; font-size:13px; }
        .sev-badge { font-size:10px; padding:2px 6px; border-radius:4px; font-weight:700; }
        .sev-badge-critical { background:#fee2e2; color:#dc2626; }
        .sev-badge-warning { background:#fef3c7; color:#d97706; }
        .sev-badge-info { background:#e0e7ff; color:#4f46e5; }
        .sev-badge-pass { background:#dcfce7; color:#16a34a; }
        .check-item-detail { font-size:12px; color:#475569; margin:4px 0; line-height:1.5; }
        .check-diff-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:6px; background:#f8fafc; padding:8px; border-radius:4px; }
        .diff-label { font-size:10px; color:#94a3b8; display:block; }
        .diff-val { font-size:12px; font-weight:600; color:#1e293b; word-break:break-all; }
        .diff-mismatch { color:#dc2626; }
        .pass-toggle { width:100%; padding:5px; border:1px dashed #d1fae5; border-radius:4px; background:transparent; cursor:pointer; font-size:11px; color:#16a34a; margin-top:4px; }
        .pass-toggle:hover { background:#f0fdf4; }
        .pass-items.hidden { display:none; }
    </style>
</head>
<body>
    <header class='glass-header'>
        <div class='header-inner'>
            <div class='logo'>
                <i class='ri-bank-card-2-line logo-icon'></i>
                <span class='logo-text'>网银权限预审中心 <span style='font-weight:300; font-size:12px; opacity:0.7;'>专业辅助审计版 V3.2</span></span>
            </div>
            <div class='header-actions'>
                <button class='btn-icon' id='btn-settings'><i class='ri-settings-3-line'></i></button>
            </div>
        </div>
    </header>

    <main class='container'>
        <section class='panel-left'>
            <div class='card glass-card'>
                <div class='card-header'><h2><i class='ri-equalizer-line'></i> 资料提交</h2></div>
                <div class='card-body'>
                    <form id='upload-form'>
                        <div class='upload-zone' id='zone-eflow'>
                            <input type='file' id='file-eflow' name='eflow_json' accept='.json' required hidden>
                            <div class='upload-content'><i class='ri-survey-line drop-icon'></i><p id='name-eflow'>上传 E-Flow 数据</p></div>
                        </div>
                        <div class='upload-zone' id='zone-bank'>
                            <input type='file' id='file-bank' name='bank_doc' accept='.doc,.docx,.pdf' required hidden multiple>
                            <div class='upload-content'><i class='ri-file-word-line drop-icon'></i><p id='name-bank'>上传银行申请表</p></div>
                        </div>
                        <div class='upload-zone' id='zone-id'>
                            <input type='file' id='file-id' name='id_documents' accept='image/*,.pdf' required hidden multiple>
                            <div class='upload-content'><i class='ri-profile-line drop-icon'></i><p id='name-id'>上传证件</p></div>
                        </div>
                        <button type='submit' class='btn-primary' id='btn-submit' style='height:44px;'>开始智感审计比对</button>
                    </form>
                    <div style='margin-top:20px;'>
                        <select id='case-select' class='modern-select'><option value=''>加载标准测试用例...</option></select>
                        <button id='btn-run-case' class='btn-secondary' style='width:100%; margin-top:10px;'>运行选中用例</button>
                    </div>
                </div>
            </div>
        </section>

        <section class='panel-right' id='result-panel' style='display:none;'>
            <div class='card result-summary' id='summary-card'>
                <div class='status-icon' id='status-icon'></div>
                <div class='status-texts'>
                    <h2 id='status-title'>画像分析中...</h2>
                    <p id='status-desc'></p>
                </div>
            </div>

            <div id='llm-summary-card' style='display:none;'>
                <div class='aggregator-summary'>
                    <div id='aggregator-text' style='font-weight:600; border-bottom:1px solid #eee; padding-bottom:12px; margin-bottom:12px;'></div>
                    <div id='llm-risk-insights' style='font-size:13px; color:#475569;'></div>
                </div>
            </div>

            <div class='extraction-grid'>
                <div class='extract-col'>
                    <div class='col-header eflow-header'><i class='ri-database-2-line'></i> EFlow 业务底账 (分类收拢)</div>
                    <div class='col-body' id='ext-eflow'></div>
                </div>
                <div class='extract-col'>
                    <div class='col-header word-header'><i class='ri-file-search-line'></i> 文档解析对齐 (点击穿透)</div>
                    <div class='col-body' id='ext-word'></div>
                </div>
                <div class='extract-col'>
                    <div class='col-header ocr-header'><i class='ri-shield-user-line'></i> 证件提取对齐</div>
                    <div class='col-body' id='ext-ocr'></div>
                </div>
            </div>

            <div class='card glass-card'>
                <div class='card-header'><h2><i class='ri-钉线-line'></i> 场景聚类审计明细</h2></div>
                <div class='card-body' id='check-list-container' style='padding:0;'></div>
            </div>
        </section>
    </main>

    <div class='full-text-modal' id='full-text-modal'>
        <div class='modal-inner'>
            <div class='modal-header'><h3>文档全文回溯解析</h3><button class='btn-close' id='close-modal'>×</button></div>
            <div class='modal-body-scroll' id='modal-body-content'></div>
        </div>
    </div>

    <!-- Loading 遮罩层 (必须存在，app.js 依赖此元素) -->
    <div class='loading-overlay' id='loading-overlay'>
        <div class='scanner'></div>
        <p>正在跨文档综合研判中，请稍候...</p>
    </div>

    <!-- 设置模态框 -->
    <div class="modal" id="settings-modal">
        <div class="modal-content glass-card">
            <div class="modal-header">
                <h2>LLM 大语言模型配置</h2>
                <button class="btn-close" id="btn-close-settings">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group" style="margin-bottom:15px;">
                    <label style="font-size:12px; display:block; margin-bottom:5px;">API 协议类型</label>
                    <select id="cfg-type" class="modern-select" style="width:100%;">
                        <option value="openai">OpenAI SDK (通用/国产大模型)</option>
                        <option value="requests">Requests 请求 (公司内网专用)</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom:15px;">
                    <label style="font-size:12px; display:block; margin-bottom:5px;">API Base URL</label>
                    <input type="text" id="cfg-base" class="modern-input" style="width:100%; height:32px; padding:0 10px;" placeholder="https://api.openai.com/v1">
                </div>
                <div class="form-group" style="margin-bottom:15px;">
                    <label style="font-size:12px; display:block; margin-bottom:5px;">API Key</label>
                    <input type="password" id="cfg-key" class="modern-input" style="width:100%; height:32px; padding:0 10px;" placeholder="sk-...">
                </div>
                <div class="form-group" style="margin-bottom:15px;">
                    <label style="font-size:12px; display:block; margin-bottom:5px;">Model Name</label>
                    <input type="text" id="cfg-model" class="modern-input" style="width:100%; height:32px; padding:0 10px;" placeholder="moonshot-v1-8k">
                </div>
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button class="btn-primary" id="btn-save-settings" style="flex:1; height:36px;">保存配置</button>
                    <button class="btn-secondary" id="btn-close-settings-2" style="flex:1; height:36px;">取消</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 图表和脚本 -->
    <script src="/static/app.js?v=20260416_2350"></script>
</body>
</html>
